<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💬 N8N Chat - Real-time Go Chat</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            overflow: hidden;
        }
        
        /* Auth Modal */
        .auth-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        
        .auth-box {
            background: white;
            padding: 40px;
            border-radius: 20px;
            width: 400px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        
        .auth-box h2 {
            text-align: center;
            color: #667eea;
            margin-bottom: 30px;
            font-size: 28px;
        }
        
        .auth-box input {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        
        .auth-box input:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .auth-box button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            cursor: pointer;
            margin-top: 20px;
            transition: transform 0.2s;
        }
        
        .auth-box button:hover {
            transform: translateY(-2px);
        }
        
        .auth-toggle {
            text-align: center;
            margin-top: 20px;
            color: #666;
        }
        
        .auth-toggle a {
            color: #667eea;
            cursor: pointer;
            text-decoration: none;
        }
        
        /* Chat Layout */
        .chat-container {
            display: grid;
            grid-template-columns: 250px 1fr 250px;
            height: 100vh;
            display: none;
        }
        
        /* Sidebar */
        .sidebar {
            background: #1a1a2e;
            color: white;
            padding: 20px;
            overflow-y: auto;
        }
        
        .sidebar h3 {
            color: #667eea;
            margin-bottom: 15px;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .room-list {
            list-style: none;
        }
        
        .room-list li {
            padding: 12px 15px;
            border-radius: 10px;
            cursor: pointer;
            margin: 5px 0;
            transition: background 0.2s;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .room-list li:hover {
            background: rgba(102, 126, 234, 0.2);
        }
        
        .room-list li.active {
            background: #667eea;
        }
        
        .room-icon {
            font-size: 18px;
        }
        
        /* Main Chat Area */
        .chat-area {
            background: #f5f5f5;
            display: flex;
            flex-direction: column;
        }
        
        .chat-header {
            background: white;
            padding: 20px;
            border-bottom: 1px solid #e0e0e0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .chat-header h2 {
            color: #333;
        }
        
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }
        
        .message {
            background: white;
            padding: 15px;
            border-radius: 15px;
            margin: 10px 0;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            animation: slideIn 0.3s ease;
        }
        
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .message-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }
        
        .message-username {
            font-weight: bold;
            color: #667eea;
        }
        
        .message-time {
            font-size: 12px;
            color: #999;
        }
        
        .message-content {
            color: #333;
            line-height: 1.5;
        }
        
        .message.own {
            background: #667eea;
            margin-left: 50px;
        }
        
        .message.own .message-username,
        .message.own .message-time,
        .message.own .message-content {
            color: white;
        }
        
        /* Chat Input */
        .chat-input {
            background: white;
            padding: 20px;
            border-top: 1px solid #e0e0e0;
            display: flex;
            gap: 10px;
        }
        
        .chat-input input {
            flex: 1;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 25px;
            font-size: 16px;
            outline: none;
        }
        
        .chat-input input:focus {
            border-color: #667eea;
        }
        
        .chat-input button {
            padding: 15px 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-size: 16px;
            transition: transform 0.2s;
        }
        
        .chat-input button:hover {
            transform: scale(1.05);
        }
        
        /* Users Panel */
        .users-panel {
            background: white;
            padding: 20px;
            overflow-y: auto;
        }
        
        .user-list {
            list-style: none;
        }
        
        .user-list li {
            padding: 10px;
            border-radius: 10px;
            margin: 5px 0;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .user-avatar {
            width: 35px;
            height: 35px;
            border-radius: 50%;
        }
        
        .user-status {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #4CAF50;
        }
        
        .user-status.offline {
            background: #999;
        }
        
        /* Typing indicator */
        .typing-indicator {
            padding: 10px 20px;
            color: #999;
            font-style: italic;
            font-size: 14px;
            display: none;
        }
        
        /* Connection status */
        .connection-status {
            position: fixed;
            top: 10px;
            right: 10px;
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 14px;
            z-index: 100;
        }
        
        .connection-status.connected {
            background: #4CAF50;
            color: white;
        }
        
        .connection-status.disconnected {
            background: #f44336;
            color: white;
        }
        
        /* Error message */
        .error-msg {
            background: #f44336;
            color: white;
            padding: 10px;
            border-radius: 5px;
            margin: 10px 0;
            display: none;
        }
    </style>
</head>
<body>
    <!-- Auth Modal -->
    <div class="auth-modal" id="authModal">
        <div class="auth-box">
            <h2>💬 N8N Chat</h2>
            <div id="loginForm">
                <input type="text" id="loginUsername" placeholder="Username" autocomplete="username">
                <input type="password" id="loginPassword" placeholder="Password" autocomplete="current-password">
                <button onclick="login()">Login</button>
                <div class="auth-toggle">
                    No account? <a onclick="showRegister()">Register</a>
                </div>
            </div>
            <div id="registerForm" style="display: none;">
                <input type="text" id="regUsername" placeholder="Username" autocomplete="username">
                <input type="email" id="regEmail" placeholder="Email" autocomplete="email">
                <input type="password" id="regPassword" placeholder="Password" autocomplete="new-password">
                <button onclick="register()">Register</button>
                <div class="auth-toggle">
                    Have account? <a onclick="showLogin()">Login</a>
                </div>
            </div>
            <div class="error-msg" id="authError"></div>
        </div>
    </div>
    
    <!-- Chat Container -->
    <div class="chat-container" id="chatContainer">
        <!-- Sidebar -->
        <div class="sidebar">
            <h3>📋 Rooms</h3>
            <ul class="room-list" id="roomList"></ul>
            
            <h3 style="margin-top: 30px;">👤 Profile</h3>
            <div id="userInfo" style="padding: 10px; border-radius: 10px; background: rgba(102, 126, 234, 0.2);">
                <div id="currentUsername" style="font-weight: bold;"></div>
                <button onclick="logout()" style="margin-top: 10px; padding: 8px 15px; background: #f44336; color: white; border: none; border-radius: 5px; cursor: pointer;">Logout</button>
            </div>
        </div>
        
        <!-- Main Chat -->
        <div class="chat-area">
            <div class="chat-header">
                <h2 id="currentRoom">💬 General</h2>
                <div id="onlineCount">🟢 0 online</div>
            </div>
            
            <div class="chat-messages" id="chatMessages"></div>
            
            <div class="typing-indicator" id="typingIndicator"></div>
            
            <div class="chat-input">
                <input type="text" id="messageInput" placeholder="Type a message..." onkeypress="handleKeyPress(event)" oninput="handleTyping()">
                <button onclick="sendMessage()">🚀 Send</button>
            </div>
        </div>
        
        <!-- Users Panel -->
        <div class="users-panel">
            <h3 style="color: #667eea; margin-bottom: 15px;">👥 Online Users</h3>
            <ul class="user-list" id="userList"></ul>
        </div>
    </div>
    
    <!-- Connection Status -->
    <div class="connection-status disconnected" id="connectionStatus">🔴 Disconnected</div>
    
    <script>
        // Global variables
        let ws = null;
        let currentUser = null;
        let currentRoom = 'general';
        let typingTimeout = null;
        let rooms = [];
        
        // Auth functions
        function showRegister() {
            document.getElementById('loginForm').style.display = 'none';
            document.getElementById('registerForm').style.display = 'block';
        }
        
        function showLogin() {
            document.getElementById('registerForm').style.display = 'none';
            document.getElementById('loginForm').style.display = 'block';
        }
        
        function showError(msg) {
            const errorEl = document.getElementById('authError');
            errorEl.textContent = msg;
            errorEl.style.display = 'block';
            setTimeout(() => errorEl.style.display = 'none', 3000);
        }
        
        async function login() {
            const username = document.getElementById('loginUsername').value;
            const password = document.getElementById('loginPassword').value;
            
            try {
                const res = await fetch('/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                
                const data = await res.json();
                if (res.ok) {
                    currentUser = data.user;
                    document.getElementById('authModal').style.display = 'none';
                    document.getElementById('chatContainer').style.display = 'grid';
                    document.getElementById('currentUsername').textContent = '👤 ' + currentUser.username;
                    connectWebSocket();
                    loadRooms();
                    loadMessages();
                } else {
                    showError(data.error);
                }
            } catch (err) {
                showError('Connection error');
            }
        }
        
        async function register() {
            const username = document.getElementById('regUsername').value;
            const email = document.getElementById('regEmail').value;
            const password = document.getElementById('regPassword').value;
            
            try {
                const res = await fetch('/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, email, password })
                });
                
                const data = await res.json();
                if (res.ok) {
                    currentUser = data.user;
                    document.getElementById('authModal').style.display = 'none';
                    document.getElementById('chatContainer').style.display = 'grid';
                    document.getElementById('currentUsername').textContent = '👤 ' + currentUser.username;
                    connectWebSocket();
                    loadRooms();
                    loadMessages();
                } else {
                    showError(data.error);
                }
            } catch (err) {
                showError('Connection error');
            }
        }
        
        function logout() {
            if (ws) ws.close();
            document.cookie = 'auth_token=; Path=/; Expires=Thu, 01 Jan 1970 00:00:01 GMT;';
            location.reload();
        }
        
        // WebSocket connection
        function connectWebSocket() {
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            ws = new WebSocket(`${protocol}//${window.location.host}/ws?room=${currentRoom}`);
            
            ws.onopen = () => {
                document.getElementById('connectionStatus').textContent = '🟢 Connected';
                document.getElementById('connectionStatus').className = 'connection-status connected';
            };
            
            ws.onclose = () => {
                document.getElementById('connectionStatus').textContent = '🔴 Disconnected';
                document.getElementById('connectionStatus').className = 'connection-status disconnected';
                setTimeout(connectWebSocket, 3000);
            };
            
            ws.onmessage = (event) => {
                const msg = JSON.parse(event.data);
                handleWebSocketMessage(msg);
            };
        }
        
        function handleWebSocketMessage(msg) {
            switch (msg.type) {
                case 'message':
                    addMessage(msg.payload);
                    break;
                case 'user_joined':
                    addSystemMessage(`${msg.payload.username} joined the room`);
                    loadUsers();
                    break;
                case 'online_users':
                    updateOnlineUsers(msg.payload);
                    break;
                case 'typing':
                    showTyping(msg.payload);
                    break;
            }
        }
        
        // Load functions
        async function loadRooms() {
            const res = await fetch('/api/rooms');
            rooms = await res.json();
            renderRooms();
        }
        
        function renderRooms() {
            const roomList = document.getElementById('roomList');
            roomList.innerHTML = rooms.map(room => `
                <li class="${room.name === currentRoom ? 'active' : ''}" onclick="switchRoom('${room.name}')">
                    <span class="room-icon">${getRoomIcon(room.name)}</span>
                    ${room.name}
                </li>
            `).join('');
        }
        
        function getRoomIcon(name) {
            const icons = {
                'general': '💬',
                'random': '🎲',
                'tech': '💻',
                'go-lang': '🐹',
                'news': '📰'
            };
            return icons[name] || '📁';
        }
        
        async function loadMessages() {
            const res = await fetch(`/api/messages?room=${currentRoom}`);
            const messages = await res.json();
            const chatMessages = document.getElementById('chatMessages');
            chatMessages.innerHTML = messages.map(msg => renderMessage(msg)).join('');
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }
        
        async function loadUsers() {
            const res = await fetch('/api/users');
            const users = await res.json();
            // Filter online users
        }
        
        // Chat functions
        function switchRoom(roomName) {
            currentRoom = roomName;
            document.getElementById('currentRoom').textContent = getRoomIcon(roomName) + ' ' + roomName;
            
            if (ws) ws.close();
            connectWebSocket();
            loadMessages();
            renderRooms();
        }
        
        function sendMessage() {
            const input = document.getElementById('messageInput');
            const content = input.value.trim();
            
            if (!content || !ws) return;
            
            ws.send(JSON.stringify({
                type: 'message',
                room_id: currentRoom,
                payload: content
            }));
            
            input.value = '';
        }
        
        function handleKeyPress(event) {
            if (event.key === 'Enter') sendMessage();
        }
        
        function handleTyping() {
            if (!ws) return;
            
            ws.send(JSON.stringify({
                type: 'typing',
                room_id: currentRoom,
                payload: true
            }));
            
            clearTimeout(typingTimeout);
            typingTimeout = setTimeout(() => {
                ws.send(JSON.stringify({
                    type: 'typing',
                    room_id: currentRoom,
                    payload: false
                }));
            }, 2000);
        }
        
        // Render functions
        function renderMessage(msg) {
            const isOwn = msg.username === currentUser?.username;
            const time = new Date(msg.timestamp).toLocaleTimeString();
            
            return `
                <div class="message ${isOwn ? 'own' : ''}">
                    <div class="message-header">
                        <span class="message-username">${msg.username}</span>
                        <span class="message-time">${time}</span>
                    </div>
                    <div class="message-content">${escapeHtml(msg.content)}</div>
                </div>
            `;
        }
        
        function addMessage(msg) {
            const chatMessages = document.getElementById('chatMessages');
            chatMessages.innerHTML += renderMessage(msg);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }
        
        function addSystemMessage(text) {
            const chatMessages = document.getElementById('chatMessages');
            chatMessages.innerHTML += `<div style="text-align: center; color: #999; padding: 10px;">${text}</div>`;
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }
        
        function updateOnlineUsers(users) {
            const userList = document.getElementById('userList');
            document.getElementById('onlineCount').textContent = `🟢 ${users.length} online`;
            
            userList.innerHTML = users.map(username => `
                <li>
                    <div class="user-status"></div>
                    <span>${username}</span>
                </li>
            `).join('');
        }
        
        function showTyping(payload) {
            const indicator = document.getElementById('typingIndicator');
            if (payload.is_typing && payload.username !== currentUser?.username) {
                indicator.textContent = `${payload.username} is typing...`;
                indicator.style.display = 'block';
                setTimeout(() => indicator.style.display = 'none', 3000);
            }
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // Check if already logged in
        document.addEventListener('DOMContentLoaded', () => {
            // Check for auth cookie
            if (document.cookie.includes('auth_token=')) {
                // Already logged in, show chat
                document.getElementById('authModal').style.display = 'none';
                document.getElementById('chatContainer').style.display = 'grid';
                connectWebSocket();
                loadRooms();
                loadMessages();
            }
        });
    </script>
</body>
</html>

<!doctype html><html lang="ru"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"><meta name="apple-mobile-web-app-capable" content="yes"><meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"><meta name="theme-color" content="#0a0a1a"><meta name="mobile-web-app-capable" content="yes"><title>Go Tap Master — Cyberpunk Edition</title><style>* {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: linear-gradient(135deg, #0a0a1a 0%, #1a1a3a 50%, #0f0f2a 100%);
            touch-action: none;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }
        
        #root {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .loading {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #0a0a1a 0%, #1a1a3a 50%, #0f0f2a 100%);
            z-index: 9999;
        }
        
        .loading-spinner {
            width: 80px;
            height: 80px;
            border: 6px solid rgba(0, 255, 255, 0.2);
            border-top-color: #00FFFF;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.5);
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .loading-gopher {
            font-size: 70px;
            margin-top: 25px;
            animation: bounce 0.5s ease infinite alternate;
            filter: drop-shadow(0 0 20px rgba(0, 255, 255, 0.6));
        }
        
        @keyframes bounce {
            from { transform: translateY(0); }
            to { transform: translateY(-15px); }
        }
        
        .loading-text {
            color: #00FFFF;
            margin-top: 30px;
            font-family: 'Arial Black', Arial, sans-serif;
            font-size: 22px;
            text-transform: uppercase;
            letter-spacing: 3px;
            text-shadow: 0 0 10px rgba(0, 255, 255, 0.8);
        }
        
        .loading-subtext {
            color: #00FF88;
            margin-top: 12px;
            font-family: Arial, sans-serif;
            font-size: 14px;
            letter-spacing: 2px;
        }
        
        .cyber-line {
            position: fixed;
            height: 2px;
            background: linear-gradient(90deg, transparent, #00FFFF, transparent);
            animation: scan 3s linear infinite;
        }
        
        @keyframes scan {
            0% { top: 0%; opacity: 0; }
            50% { opacity: 0.5; }
            100% { top: 100%; opacity: 0; }
        }</style><script defer="defer" src="bundle.js"></script></head><body><div id="root"><div class="loading" id="loading"><div class="loading-spinner"></div><div class="loading-gopher">🐹</div><div class="loading-text">CYBERPUNK EDITION</div><div class="loading-subtext">НЕОНОВОЕ БУДУЩЕЕ GO</div><div class="cyber-line" style="animation-delay: 0s;"></div><div class="cyber-line" style="animation-delay: 1s;"></div><div class="cyber-line" style="animation-delay: 2s;"></div></div></div><script>window.addEventListener('load', () => {
            setTimeout(() => {
                const loading = document.getElementById('loading');
                if (loading) {
                    loading.style.opacity = '0';
                    loading.style.transition = 'opacity 0.5s';
                    setTimeout(() => loading.remove(), 500);
                }
            }, 1500);
        });
        
        let lastTouchEnd = 0;
        document.addEventListener('touchend', (e) => {
            const now = Date.now();
            if (now - lastTouchEnd <= 300) {
                e.preventDefault();
            }
            lastTouchEnd = now;
        }, false);
        
        document.body.addEventListener('touchmove', (e) => {
            if (e.scale !== 1) {
                e.preventDefault();
            }
        }, { passive: false });</script></body></html>

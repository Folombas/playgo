<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🟣 Purple Lord - ТЕСТ</title>
    <style>
        body {
            margin: 0;
            background: #1a0a2e;
            color: #fff;
            font-family: monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        #info {
            background: rgba(0,0,0,0.8);
            padding: 20px;
            border-radius: 10px;
            border: 2px solid #8a2be2;
            max-width: 600px;
        }
        .ok { color: #00ff00; }
        .error { color: #ff0000; }
        button {
            background: #8a2be2;
            color: white;
            border: none;
            padding: 10px 20px;
            margin: 5px;
            cursor: pointer;
            font-size: 16px;
            border-radius: 5px;
        }
        button:hover { background: #9d3bf0; }
    </style>
</head>
<body>
    <div id="info">
        <h2>🟣 Purple Lord - Диагностика</h2>
        <div id="status"></div>
        <hr style="border-color: #333; margin: 15px 0;">
        <button onclick="testAPI()">🧪 Тест API</button>
        <button onclick="location.href='/index.html'">🎮 Запустить игру</button>
        <div id="results" style="margin-top: 15px;"></div>
    </div>

    <script>
        const statusDiv = document.getElementById('status');
        const resultsDiv = document.getElementById('results');
        
        // Проверка загрузки
        window.addEventListener('load', () => {
            statusDiv.innerHTML = '<p class="ok">✅ Страница загружена</p>';
            console.log('✅ Test page loaded');
        });
        
        // Тест API
        async function testAPI() {
            resultsDiv.innerHTML = '<p>🔄 Тестируем API...</p>';
            
            try {
                // Тест прогресса
                const progressRes = await fetch('http://localhost:3000/api/progress?playerId=test');
                const progress = await progressRes.json();
                console.log('Progress:', progress);
                
                // Тест лидерборда
                const leaderboardRes = await fetch('http://localhost:3000/api/leaderboard');
                const leaderboard = await leaderboardRes.json();
                console.log('Leaderboard:', leaderboard);
                
                resultsDiv.innerHTML = `
                    <p class="ok">✅ API работает!</p>
                    <p><strong>Progress:</strong> ${JSON.stringify(progress)}</p>
                    <p><strong>Leaderboard:</strong> ${JSON.stringify(leaderboard)}</p>
                `;
            } catch (e) {
                resultsDiv.innerHTML = `<p class="error">❌ Ошибка API: ${e.message}</p>`;
                console.error('API Error:', e);
            }
        }
        
        // Логирование ошибок
        window.addEventListener('error', (e) => {
            console.error('Global error:', e.error);
            resultsDiv.innerHTML += `<p class="error">❌ ${e.error?.message || e.message}</p>`;
        });
    </script>
</body>
</html>

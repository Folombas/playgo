<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🟣 Purple Lord: Digital Odyssey</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: linear-gradient(135deg, #1a0a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Courier New', monospace;
            overflow: hidden;
        }
        
        #game-container {
            position: relative;
            box-shadow: 0 0 50px rgba(138, 43, 226, 0.5);
            border: 3px solid #8a2be2;
            border-radius: 10px;
        }
        
        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #fff;
            font-size: 24px;
            text-align: center;
            z-index: 1000;
        }
        
        .loading-bar {
            width: 300px;
            height: 20px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            margin-top: 20px;
            overflow: hidden;
        }
        
        .loading-progress {
            height: 100%;
            background: linear-gradient(90deg, #8a2be2, #00ffff);
            width: 0%;
            transition: width 0.3s;
        }
        
        #controls-hint {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.7);
            font-size: 14px;
            text-align: center;
            background: rgba(0, 0, 0, 0.5);
            padding: 10px 20px;
            border-radius: 8px;
        }
        
        .key {
            display: inline-block;
            background: rgba(138, 43, 226, 0.3);
            border: 1px solid #8a2be2;
            padding: 3px 8px;
            border-radius: 4px;
            margin: 0 3px;
        }
    </style>
</head>
<body>
    <div id="game-container">
        <div id="loading">
            <div>🟣 Purple Lord: Digital Odyssey</div>
            <div class="loading-bar">
                <div class="loading-progress" id="loading-progress"></div>
            </div>
        </div>
    </div>
    
    <div id="controls-hint">
        <span class="key">A</span><span class="key">D</span> Движение 
        <span class="key">W</span>/<span class="key">SPACE</span> Прыжок 
        <span class="key">F</span> Заклинание 
        <span class="key">ESC</span> Меню
    </div>

    <!-- Phaser 3 CDN -->
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.80.1/dist/phaser.min.js"></script>
    
    <!-- Game modules -->
    <script src="src/api.js"></script>
    <script src="src/objects/Player.js"></script>
    <script src="src/objects/Enemy.js"></script>
    <script src="src/objects/Collectible.js"></script>
    <script src="src/ui/HUD.js"></script>
    <script src="src/scenes/Boot.js"></script>
    <script src="src/scenes/Menu.js"></script>
    <script src="src/scenes/Level.js"></script>
    <script src="src/scenes/Victory.js"></script>
    <script src="src/main.js"></script>
    
    <script>
        // Progress indicator
        const progressBar = document.getElementById('loading-progress');
        const loadingScreen = document.getElementById('loading');
        
        // Debug info
        window.gameLoadErrors = [];
        window.addEventListener('error', (e) => {
            console.error('❌ Error:', e.error);
            window.gameLoadErrors.push(e.error?.message || e.message);
            updateDebugInfo();
        });
        
        window.addEventListener('unhandledrejection', (e) => {
            console.error('❌ Promise rejection:', e.reason);
            window.gameLoadErrors.push('Promise error: ' + e.reason);
            updateDebugInfo();
        });
        
        function updateDebugInfo() {
            const debugDiv = document.getElementById('debug-info');
            if (debugDiv && window.gameLoadErrors.length > 0) {
                debugDiv.innerHTML = '<p style="color: #ff4444; margin-top: 10px;">' +
                    '<strong>❌ Ошибки:</strong><br>' +
                    window.gameLoadErrors.map(e => '• ' + e).join('<br>') +
                    '</p>';
            }
        }
        
        // Check if Phaser loaded
        if (typeof Phaser === 'undefined') {
            window.gameLoadErrors.push('Phaser не загружен!');
            updateDebugInfo();
        } else {
            console.log('✅ Phaser version:', Phaser.VERSION);
        }
        
        // Hide loading screen after game starts
        setTimeout(() => {
            if (window.gameInstance) {
                loadingScreen.style.opacity = '0';
                loadingScreen.style.transition = 'opacity 0.5s';
                setTimeout(() => {
                    loadingScreen.style.display = 'none';
                }, 500);
            }
        }, 3000);
    </script>
    
    <div id="debug-info" style="position: fixed; bottom: 60px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.9); padding: 15px; border-radius: 8px; border: 2px solid #ff4444; max-width: 500px; font-size: 12px; z-index: 9999;"></div>
</body>
</html>

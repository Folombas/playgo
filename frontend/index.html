<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌌 Go Space Runner</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="game-container">
        <canvas id="game-canvas"></canvas>
        
        <!-- UI Overlay -->
        <div id="ui-overlay">
            <div id="hud">
                <div id="score">Score: <span id="score-value">0</span></div>
                <div id="health">
                    <div id="health-bar">
                        <div id="health-fill"></div>
                    </div>
                </div>
                <div id="level">Level: <span id="level-value">1</span></div>
            </div>
            
            <div id="start-screen" class="screen">
                <h1>🌌 Go Space Runner</h1>
                <p class="subtitle">3D Space Adventure</p>
                <button id="start-btn" class="btn btn-primary">Start Game</button>
                <div class="controls">
                    <h3>Controls</h3>
                    <p>WASD / Arrows — Move</p>
                    <p>Space — Boost</p>
                    <p>M — Toggle Music</p>
                </div>
            </div>
            
            <div id="game-over-screen" class="screen hidden">
                <h1>Game Over</h1>
                <p>Final Score: <span id="final-score">0</span></p>
                <button id="restart-btn" class="btn btn-primary">Play Again</button>
                <button id="save-score-btn" class="btn btn-secondary">Save Score</button>
            </div>
            
            <div id="leaderboard-screen" class="screen hidden">
                <h1>🏆 Leaderboard</h1>
                <div id="leaderboard-list"></div>
                <button id="back-btn" class="btn btn-secondary">Back</button>
            </div>
        </div>
    </div>
    
    <script type="module" src="main.js"></script>
</body>
</html>
